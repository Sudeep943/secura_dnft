# Face recognition service URL (real face matching).
# Set the FACE_RECOGNITION_SERVICE_URL environment variable in Railway to point
# to the deployed Python microservice.  Without this, the SHA-256 stub is used,
# which produces random embeddings that can NEVER match different photos of the
# same person (scores will be ~0.10-0.12 regardless of lighting).
face.recognition.service.url=${FACE_RECOGNITION_SERVICE_URL:}

# Attendance face-match threshold (cosine similarity, 0-1).
# 0.50 is recommended for the 128-d face_recognition microservice.
attendance.face.match.threshold=${FACE_MATCH_THRESHOLD:0.50}

