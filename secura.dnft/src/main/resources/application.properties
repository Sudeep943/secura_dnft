spring.application.name=secura.dnft

# Local development database (use application-railway.properties for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/secura_dnft
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

privacy.secrect.key=1234567890123456
privacy.secrect.algo=AES

