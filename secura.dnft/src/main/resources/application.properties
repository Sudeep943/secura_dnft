# Face recognition service (required for real face matching).
# The built-in SHA-256 stub (used when this is blank) can ONLY match identical
# image bytes — it will NOT match different photos of the same person.
#
# To enable real face recognition:
# 1. Start the Python microservice in face-recognition-service/:
#      pip install -r face-recognition-service/requirements.txt
#      python face-recognition-service/app.py
#    Or with Docker:
#      docker build -t secura-face-svc face-recognition-service/
#      docker run -p 5001:5001 secura-face-svc
# 2. Set the URL below and restart Spring Boot.
# 3. Re-enrol all employees (POST /api/v1/admin/employees/onboard) because
#    stub embeddings are incompatible with real face embeddings.
#
# The Python service uses dlib's ResNet model (face_recognition library) which
# analyses 68 facial landmarks (eyes, nose, mouth, eyebrows, jawline) and
# returns a 128-dimensional embedding. The same face in different photos
# typically produces a cosine similarity of 0.5–0.9.
#face.recognition.service.url=http://localhost:5001

# Attendance face-match threshold (cosine similarity, 0-1).
# Recommended values:
#   0.50 — when using the 128-d face_recognition microservice (more permissive)
#   0.65 — original default (suitable for 512-d ArcFace/InsightFace)
# Use POST /api/v1/attendance/face-score to test your threshold without logging.
attendance.face.match.threshold=0.50

