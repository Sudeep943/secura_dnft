# Face recognition service (optional).
# When set, extractEmbedding() delegates to this external service so that
# different photos of the same face match correctly.
# The service must expose: POST {url}/extract-embedding
#   Body:     {"image_base64": "<base64>"}
#   Response: float[] JSON array (e.g. [0.12, -0.34, ...], length must be 512)
# Leave blank to use the built-in deterministic stub (same image bytes = match).
#face.recognition.service.url=http://localhost:5001

# Attendance face-match threshold (cosine similarity, 0-1). Default: 0.65
attendance.face.match.threshold=0.65

